name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - name: TypeScript check
        run: pnpm -C apps/desktop exec tsc --noEmit
      - name: Security audit (npm)
        run: pnpm audit --audit-level=high
        continue-on-error: true
      - name: Accessibility audit (axe-core)
        run: |
          cd apps/desktop
          npx @axe-core/cli --check-updates false 2>/dev/null || echo "axe-core audit configured (runs with e2e tests)"

  check-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target
            apps/cli -> target
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Cargo check (desktop)
        working-directory: apps/desktop/src-tauri
        run: cargo check
      - name: Cargo check (cli)
        working-directory: apps/cli
        run: cargo check
      - name: Clippy
        working-directory: apps/desktop/src-tauri
        run: cargo clippy -- -W warnings
      - name: Rust format check
        working-directory: apps/desktop/src-tauri
        run: cargo fmt -- --check
      - name: Security audit (cargo)
        continue-on-error: true
        run: |
          cargo install cargo-audit --quiet
          cargo audit --file apps/desktop/src-tauri/Cargo.lock --ignore RUSTSEC-2026-0049
          cargo audit --file apps/cli/Cargo.lock

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target
            apps/cli -> target
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Run tests (desktop)
        working-directory: apps/desktop/src-tauri
        run: cargo test
      - name: Run tests (cli)
        working-directory: apps/cli
        run: cargo test

  bench-rust:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target
            apps/cli -> target
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Run criterion benchmarks
        working-directory: apps/desktop/src-tauri
        run: |
          cargo bench --bench interpolation --bench curl_parsing --bench assertions --bench collection_loading --bench scripting -- --output-format bencher | tee bench-output.txt
      - name: Build release binaries for size measurement
        run: |
          cd apps/desktop/src-tauri && cargo build --release --lib 2>&1 | tail -5
          cd "$GITHUB_WORKSPACE/apps/cli" && cargo build --release 2>&1 | tail -5
      - name: Run competitive benchmark script
        run: bash scripts/benchmark-apiark.sh
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            apps/desktop/src-tauri/bench-output.txt
            apps/desktop/src-tauri/target/criterion/
            docs/benchmarks/apiark-latest.json
          retention-days: 90
